<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/burger.css">
  <link rel="stylesheet" href="css/cards.css">

  <link rel="stylesheet" href="css/toggle.css">
  <link rel="icon" type="image/png" href="img/fav.png">
  <title>Emergency Site</title>
</head>

<body id="register">
  <header>
    <nav>
      <div id="logotype-wrapper" class="logo">
        <a href="index.html">
          <img src="img/logo.svg" alt="NØDRET logo">
        </a>
      </div>
      <ul class="menu">
        <li><a class="menuItem" href="instruction.html">Hjælp</a></li>
        <li><a class="menuItem" href="register.html">Indberet</a></li>
      </ul>
      <button class="burger">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </button>
    </nav>
    <label>
      <span class="visually-hidden">lyst/mørkt</span>
      <input id="theme-toggle" type="checkbox">
    </label>
  </header>

  <main>
    <h1>INDBERET</h1>
    <section id="form-section">
      <article id="form-info">
        <h2>Overskrift</h2>
        <p>Tekst</p>
      </article>

      <form id="webform">

        <fieldset>
          <legend>Hvilken type måltid</legend>
          <label for="morgenmad">
            <input type="radio" id="morgenmad" name="foodtype">
            Morgenmad
          </label>
          <label for="frokost">
            <input type="radio" id="frokost" name="foodtype">
            Frokost
          </label>
          <label for="aftensmad">
            <input type="radio" id="aftensmad" name="foodtype">
            Aftensmad
          </label>
        </fieldset>

        <label for="slider">
          <input type="range" value="0" id="slider" min="10kr" max="2000kr">
        </label>
        <output for="slider" id="slider-value">0</output>

        <label for="madvare">
          Madvare
          <input type="text" id="madvare">
        </label>

        <fieldset>
          <legend>Type af måltid</legend>
          <label for="solo">
            <input type="checkbox" id="solo">
            En person
          </label>
          <label for="smallguests">
            <input type="checkbox" id="smallguests">
            Lille selskab
          </label>
          <label for="big">
            <input type="checkbox" id="big">
            Stort selskab
          </label>
        </fieldset>

        <button>Indsend data</button>

      </form>

    </section>


    <section id="form-summary">
      <h2>Summary</h2>
      <article>
        <p class="placeholder">Opsummering</p>
      </article>
    </section>
  </main>
  <footer>
    <nav>
      <ul>
        <li><a href="#">link</a></li>
        <li><a href="#">link</a></li>
        <li><a href="#">link</a></li>

      <ul>
        <li><a href="#">link</a></li>

        <li><a href="#">link</a></li>
      </ul>
      <ul>
        <li><a href="#">link</a></li>
        <li><a href="#">link</a></li>
        <li><a href="#">link</a></li>
        <li><a href="#">link</a></li>
      </ul>
    </nav>
  </footer>
  <script>
    function updatesResult() {
      console.log("updateResult")
      const newValue = document.querySelector("#slider").valueAsNumber;
      document.querySelector("#slider-value").value = newValue;
    }
    document.querySelector("#slider").addEventListener("input", updatesResult)
  </script>
  <script src="js/burger.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
